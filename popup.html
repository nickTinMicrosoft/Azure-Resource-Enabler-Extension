<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Resource Enabler</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div>
            <h1>Azure Resource Enabler</h1>
            <div class="header-info" id="tenantInfo">Not logged in</div>
        </div>
        <div class="header-actions">
            <button id="settingsToggleBtn" class="icon-btn" title="Settings">⚙</button>
            <button id="refreshBtn" class="icon-btn" title="Scan for disabled resources">⟳</button>
        </div>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <div class="settings-row">
            <div class="settings-field">
                <label for="clientIdInput">App Registration Client ID</label>
                <input type="text" id="clientIdInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
            </div>
            <button id="saveSettingsBtn" class="settings-btn">Save</button>
        </div>
        <div class="settings-help">Enter the Client ID of your Azure AD app registration. Changing this requires re-login.</div>
    </div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="subscription-section">
        <label for="subscriptionSelect">Subscription</label>
        <select id="subscriptionSelect" disabled>
            <option value="">Select a subscription...</option>
        </select>
    </div>

    <div class="tab-bar">
      <button class="tab active" data-tab="disabled">⚠️ Disabled (<span id="disabledCount">0</span>)</button>
      <button class="tab" data-tab="enabled">✓ Enabled (<span id="enabledCount">0</span>)</button>
    </div>

    <div class="resource-list-container" id="resourceList">
        <div class="empty-state">Click refresh to scan for disabled resources</div>
    </div>

    <div class="action-bar" id="actionBar">
        <button id="enableAllBtn" class="btn-enable-all" disabled>Re-enable All</button>
        <button id="enableSelectedBtn" class="btn-enable-selected" disabled>Re-enable Selected</button>
    </div>

    <div class="modal-overlay" id="deleteModal" style="display:none">
      <div class="modal">
        <h3>⚠️ Delete Resource</h3>
        <p>You are about to permanently delete:</p>
        <p class="modal-resource-name" id="deleteResourceName"></p>
        <p class="modal-resource-type" id="deleteResourceType"></p>
        <p>Type the resource name to confirm:</p>
        <input type="text" id="deleteConfirmInput" autocomplete="off">
        <div class="modal-actions">
          <button id="deleteCancelBtn" class="btn-cancel">Cancel</button>
          <button id="deleteConfirmBtn" class="btn-danger" disabled>Delete</button>
        </div>
      </div>
    </div>

    <div class="log-section">
        <textarea id="logArea" readonly placeholder="Operation logs will appear here..."></textarea>
        <div class="log-controls">
            <label><input type="checkbox" id="debugToggle"> Debug</label>
            <label><input type="checkbox" id="autoRefreshToggle"> Auto-scan on open</label>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
